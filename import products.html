<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منتجات الاستيراد | شركة حسني</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
background:#f5f6fa;
color:#333;
}

header{
background:#d60000;
color:#fff;
text-align:center;
padding:30px 20px;
}

.logo{
width:130px;
margin-bottom:15px;
}

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

.title{
text-align:center;
font-size:34px;
color:#d60000;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#fff;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 12px 25px rgba(214,0,0,.2);
}

.card h2{
color:#d60000;
margin-bottom:25px;
font-size:26px;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#d60000;
color:#fff;
text-decoration:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#b80000;
}

.back{
display:block;
width:280px;
margin:50px auto 0;
padding:15px;
background:#d60000;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:8px;
font-size:18px;
font-weight:bold;
transition:.3s;
}

.back:hover{
background:#b80000;
}

footer{
margin-top:50px;
background:#222;
color:#fff;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo" alt="شعار الشركة">

</header>

<div class="container">

<div class="title">

</div>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">

</div>

</div>

</div>

<a href="products.html" class="back">

</div>

<footer>

© جميع الحقوق محفوظة - شركة حسني لتجارة لعب الأطفال والاستيراد

</footer>

</body>

</html>
