<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>عربيات أطفال | شركة حسني</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
background:#f5f6fa;
color:#333;
}

header{
background:#d60000;
color:#fff;
text-align:center;
padding:30px 20px;
}

.logo{
width:130px;
margin-bottom:15px;
}

.container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

h2{
text-align:center;
color:#d60000;
margin-bottom:35px;
font-size:34px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
padding:20px;
text-align:center;
color:#d60000;
}

.btn{
display:block;
margin:0 20px 20px;
padding:14px;
text-align:center;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
background:#1ea952;
}

.back{
display:block;
width:260px;
margin:50px auto 0;
padding:15px;
text-align:center;
background:#d60000;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

footer{
margin-top:50px;
background:#222;
color:#fff;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1> المصريه الدوليه العالميه للاستثمار والتنميه شيبر اكسبريسShipper  Express ش. م.م </h1>

</header>

<div class="container">

<h2> اكياس لوكس </h2>

<div class="products">

<div class="card">
<img src="25.png" style="cursor:pointer;">
<h3> لوكس ازرق  </h3>
<a href="https://wa.me/201100831454" class="btn">اطلب الآن</a>
</div>

<div class="card">
<img src="26.png" style="cursor:pointer;">
<h3>  لوكس اسود </h3>
<a href="https://wa.me/201100831454" class="btn">اطلب الآن</a>
</div>

</div>

<a href="bags.html" class="back">
⬅ العودة إلى منتجات الاستيراد
</a>

</div>

<footer>

© جميع الحقوق محفوظة - شركة حسني لتجارة لعب الأطفال والاستيراد

</footer>

<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="" alt="">
</div>

<style>
.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
color:#fff;
font-size:45px;
font-weight:bold;
cursor:pointer;
}
</style>

<script>
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.querySelector(".close");

document.querySelectorAll(".card img").forEach(img => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
    });
});

closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
});

lightbox.addEventListener("click", (e) => {
    if(e.target === lightbox){
        lightbox.style.display = "none";
    }
});
</script>

</body>
</html>
